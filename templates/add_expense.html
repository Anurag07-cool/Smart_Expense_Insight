{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="mb-4">Add New Expense</h3>
            <form method="POST">
                <div class="mb-3">
                    <label>Description</label>
                    <input type="text" name="description" class="form-control" required placeholder="e.g. Dominos Pizza">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Amount (₹)</label>
                        <input type="number" name="amount" class="form-control" step="0.01" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Category (Optional, Auto-detected if empty)</label>
                        <select name="category" class="form-select">
                            <option value="">Auto Detect</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Payment Mode</label>
                        <select name="payment_mode" class="form-select" required>
                            <option value="UPI">UPI</option>
                            <option value="Cash">Cash</option>
                            <option value="Credit Card">Credit Card</option>
                            <option value="Debit Card">Debit Card</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3"><i class="fas fa-save"></i> Save Expense</button>
                <a href="{{ url_for('expense.list_expenses') }}" class="btn btn-light mt-3 ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
