{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="mb-4">Edit Expense</h3>
            <form method="POST">
                <div class="mb-3">
                    <label>Description</label>
                    <input type="text" name="description" class="form-control" value="{{ expense.description }}" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Amount (₹)</label>
                        <input type="number" name="amount" class="form-control" step="0.01" value="{{ expense.amount }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Date</label>
                        <input type="date" name="date" class="form-control" value="{{ expense.date }}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Category</label>
                        <select name="category" class="form-select">
                            <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
                            <option value="Transport" {% if expense.category == 'Transport' %}selected{% endif %}>Transport</option>
                            <option value="Shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                            <option value="Entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                            <option value="Utilities" {% if expense.category == 'Utilities' %}selected{% endif %}>Utilities</option>
                            <option value="Healthcare" {% if expense.category == 'Healthcare' %}selected{% endif %}>Healthcare</option>
                            <option value="Others" {% if expense.category == 'Others' %}selected{% endif %}>Others</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Payment Mode</label>
                        <select name="payment_mode" class="form-select" required>
                            <option value="Cash" {% if expense.payment_mode == 'Cash' %}selected{% endif %}>Cash</option>
                            <option value="UPI" {% if expense.payment_mode == 'UPI' %}selected{% endif %}>UPI</option>
                            <option value="Credit Card" {% if expense.payment_mode == 'Credit Card' %}selected{% endif %}>Credit Card</option>
                            <option value="Debit Card" {% if expense.payment_mode == 'Debit Card' %}selected{% endif %}>Debit Card</option>
                            <option value="Bank Transfer" {% if expense.payment_mode == 'Bank Transfer' %}selected{% endif %}>Bank Transfer</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3"><i class="fas fa-save"></i> Update Expense</button>
                <a href="{{ url_for('expense.list_expenses') }}" class="btn btn-light mt-3 ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
