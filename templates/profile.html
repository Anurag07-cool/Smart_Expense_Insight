{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <img src="https://ui-avatars.com/api/?name={{ session.get('full_name') }}&background=4361ee&color=fff&size=128" class="rounded-circle mx-auto mb-3" width="128" height="128">
            <h3>{{ session.get('full_name') }}</h3>
            <p class="text-muted">User Profile</p>
            <hr>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary mt-3">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
