{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper" style="margin: -20px;">
    <div class="auth-card">
        <h2 class="text-center mb-4 fw-bold">Create Account</h2>
        <form method="POST">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control form-control-lg" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control form-control-lg" required>
            </div>
            <div class="mb-4">
                <label>Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Register</button>
        </form>
        <p class="text-center mt-3 text-muted">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
